<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Il Gallo di Rimini</title>
    <style>
        body { 
            font-family: -apple-system, sans-serif; 
            background: #FFF0F5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            text-align: center;
        }
        .container { 
            background: white; 
            padding: 40px; 
            border-radius: 30px; 
            box-shadow: 0 10px 25px rgba(233,30,99,0.1); 
            max-width: 400px; 
            width: 90%;
        }
        
        /* STILE DEL LOGO */
        .logo-container {
            margin-bottom: 20px;
        }
        .logo-img {
            width: 120px; /* Puoi regolare la grandezza qui */
            height: 120px;
            border-radius: 50%; /* Lo rende tondo */
            object-fit: cover;
            border: 3px solid #E91E63;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 { color: #E91E63; margin-bottom: 30px; font-size: 24px; }
        
        .btn { 
            display: block; 
            background: #E91E63; 
            color: white; 
            text-decoration: none; 
            padding: 15px; 
            border-radius: 15px; 
            margin-bottom: 15px; 
            font-weight: bold; 
            transition: 0.3s;
        }
        .btn:hover { background: #C2185B; transform: translateY(-2px); }
        .btn-secondary { background: #fce4ec; color: #E91E63; border: 1px solid #E91E63; }
        .btn-secondary:hover { background: #f8bbd0; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="https://raw.githubusercontent.com/dani123456789-ctrl/Il-Gallo-di-Rimini/main/Gallo.png" 
             alt="Logo Il Gallo di Rimini" 
             class="logo-img">
    </div>

    <h1>Il Gallo di Rimini</h1>
    
    <a href="survey.html" class="btn">Inizia il Questionario</a>
    <a href="dashboard.html" class="btn btn-secondary">Guarda i Risultati</a>
</div>

</body>
</html>
