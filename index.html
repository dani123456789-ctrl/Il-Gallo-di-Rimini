<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Il Gallo di Rimini</title>
    <style>
        body { 
            font-family: -apple-system, sans-serif; 
            background: #FFF0F5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            text-align: center;
        }
        .container { 
            background: white; 
            padding: 40px; 
            border-radius: 30px; 
            box-shadow: 0 10px 25px rgba(233,30,99,0.1); 
            max-width: 400px; 
            width: 90%;
        }
        
        .logo-container {
            margin-bottom: 20px;
        }
        .logo-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #E91E63;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 { color: #E91E63; margin-bottom: 30px; font-size: 24px; }
        
        .btn { 
            display: block; 
            background: #E91E63; 
            color: white; 
            text-decoration: none; 
            padding: 15px 0; /* Padding verticale 15px, orizzontale 0 */
            border-radius: 15px; 
            margin-bottom: 15px; 
            font-weight: bold; 
            transition: 0.3s;
            cursor: pointer;
            border: none;
            width: 100%;       /* Forza la larghezza totale */
            max-width: 280px;  /* Larghezza massima fissa per entrambi */
            margin-left: auto; /* Centra il pulsante nel contenitore */
            margin-right: auto;
            font-size: 16px;
            box-sizing: border-box;
        }
        .btn:hover { background: #C2185B; transform: translateY(-2px); }
        .btn-secondary { background: #fce4ec; color: #E91E63; border: 1px solid #E91E63; }
        .btn-secondary:hover { background: #f8bbd0; }

        /* STILI PER IL POPUP (MODAL) */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            width: 80%;
            max-width: 300px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            position: relative;
        }
        .modal-text {
            color: #E91E63;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 20px;
        }
        .close-btn {
            background: #E91E63;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="https://raw.githubusercontent.com/dani123456789-ctrl/Il-Gallo-di-Rimini/main/Gallo.png" 
             alt="Logo Il Gallo di Rimini" 
             class="logo-img">
    </div>

    <h1>Il Gallo di Rimini</h1>
    
    <a href="survey.html" class="btn">Inizia il Questionario</a>
    <button onclick="showPopup()" class="btn btn-secondary">Guarda i Risultati</button>
</div>

<div id="myModal" class="modal">
    <div class="modal-content">
        <p class="modal-text">Ti piacerebbe, eh?<br><br>Ne parliamo al prossimo appuntamento! 😉🌹</p>
        <button class="close-btn" onclick="closePopup()">Chiudi</button>
    </div>
</div>

<script>
    function showPopup() {
        document.getElementById("myModal").style.display = "flex";
    }

    function closePopup() {
        document.getElementById("myModal").style.display = "none";
    }

    // Chiude il popup se si clicca fuori dal contenuto
    window.onclick = function(event) {
        let modal = document.getElementById("myModal");
        if (event.target == modal) {
            modal.style.display = "none";
        }
    }
</script>

</body>
</html>
