<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Completa - Il Gallo di Rimini</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #fdf2f8; padding: 20px; color: #1A1A2E; }
        .container { max-width: 1100px; margin: auto; }
        h1 { text-align: center; color: #E91E63; margin-bottom: 30px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #FFCDD2; margin-bottom: 25px; }
        .card h3 { color: #C2185B; font-size: 16px; margin-bottom: 15px; border-bottom: 1px solid #FCE4EC; padding-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Stile per i commenti */
        .comment-list { max-height: 200px; overflow-y: auto; padding-right: 10px; }
        .comment-item { background: #FFF8FB; padding: 10px; border-radius: 10px; margin-bottom: 8px; font-size: 14px; border-left: 3px solid #E91E63; color: #444; }
        .no-data { color: #999; font-style: italic; font-size: 13px; }
        
        .nav-link { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #E91E63; font-weight: bold; }
        canvas { max-height: 220px; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="nav-link">← Torna alla Home</a>
    <h1>📊 Report Integrale "Il Gallo di Rimini"</h1>

    <div class="grid" id="main-grid">
        </div>
</div>

<script>
    function loadDashboard() {
        const data = JSON.parse(localStorage.getItem('gallo_results_v2') || '[]');
        const grid = document.getElementById('main-grid');
        
        if (data.length === 0) {
            grid.innerHTML = "<p class='no-data'>In attesa di dati... invia il primo questionario!</p>";
            return;
        }

        // 1. CONFIGURAZIONE DOMANDE A SCELTA (GRAFICI)
        const chartConfigs = [
            { id: 'puntualita', title: 'Puntualità', type: 'pie' },
            { id: 'ascolto', title: 'Capacità di ascolto', type: 'bar' },
            { id: 'memoria', title: 'Dettagli Personali', type: 'bar' },
            { id: 'approccio', title: 'Qualità Approccio', type: 'pie' },
            { id: 'bis', title: 'Altro appuntamento?', type: 'doughnut' },
            { id: 'durata', title: 'Durata Performance', type: 'bar' },
            { id: 'gps', title: 'Capacità GPS', type: 'bar' },
            { id: 'preliminari', title: 'Gestione Preliminari', type: 'pie' },
            { id: 'posizioni', title: 'Originalità Posizioni', type: 'bar' },
            { id: 'orgasmo', title: 'Risultato Finale', type: 'bar' },
            { id: 'voto_finale', title: 'Valutazione Complessiva', type: 'doughnut' }
        ];

        const colors = ['#E91E63', '#2196F3', '#4CAF50', '#FFC107', '#9C27B0', '#FF5722', '#607D8B'];

        chartConfigs.forEach(conf => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<h3>${conf.title}</h3><canvas id="chart-${conf.id}"></canvas>`;
            grid.appendChild(card);

            const counts = {};
            data.forEach(item => {
                const val = item[conf.id] || "N/D";
                counts[val] = (counts[val] || 0) + 1;
            });

            new Chart(document.getElementById(`chart-${conf.id}`), {
                type: conf.type,
                data: {
                    labels: Object.keys(counts),
                    datasets: [{ data: Object.values(counts), backgroundColor: colors }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: (conf.type !== 'bar'), position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } }
                }
            });
        });

        // 2. CONFIGURAZIONE DOMANDE APERTE (TESTI)
        const textConfigs = [
            { id: 'difetto', title: '🆘 Peggiori Difetti Segnalati' },
            { id: 'forza', title: '⭐️ Punti di Forza' },
            { id: 'sugg_intimo', title: '💄 Suggerimenti Lato Intimo' }
        ];

        textConfigs.forEach(conf => {
            const card = document.createElement('div');
            card.className = 'card';
            
            let html = `<h3>${conf.title}</h3><div class="comment-list">`;
            
            const comments = data
                .map(item => item[conf.id])
                .filter(text => text && text.trim() !== "");

            if (comments.length > 0) {
                comments.forEach(text => {
                    html += `<div class="comment-item">"${text}"</div>`;
                });
            } else {
                html += `<div class="no-data">Nessun commento ricevuto.</div>`;
            }

            html += `</div>`;
            card.innerHTML = html;
            grid.appendChild(card);
        });
    }

    window.onload = loadDashboard;
</script>

</body>
</html>
