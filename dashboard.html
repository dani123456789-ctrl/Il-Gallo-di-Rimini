<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Il Gallo</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background: #fdf2f8; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .chart-card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #E91E63; }
        .btn-reset { margin-top: 50px; display: block; width: 200px; margin-left: auto; margin-right: auto; padding: 10px; color: #ccc; background: none; border: 1px solid #eee; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Statistiche Gallo v2</h1>
        <p id="info" style="text-align: center; color: #666;"></p>

        <div class="grid">
            <div class="chart-card"><h3>Puntualità</h3><canvas id="cPun"></canvas></div>
            <div class="chart-card"><h3>Orgasmi Partner</h3><canvas id="cOrg"></canvas></div>
            <div class="chart-card"><h3>Voto Tecnico</h3><canvas id="cVoto"></canvas></div>
            <div class="chart-card"><h3>Un altro appuntamento?</h3><canvas id="cBis"></canvas></div>
        </div>

        <button class="btn-reset" onclick="reset()">Azzerata Totale</button>
    </div>

    <script>
        function init() {
            const dati = JSON.parse(localStorage.getItem('gallo_results_v2') || '[]');
            document.getElementById('info').innerText = `${dati.length} questionari ricevuti`;

            if (dati.length === 0) return;

            const counts = { puntualita: {}, orgasmo: {}, voto_finale: {}, bis: {} };
            
            dati.forEach(r => {
                ['puntualita', 'orgasmo', 'voto_finale', 'bis'].forEach(key => {
                    counts[key][r[key]] = (counts[key][r[key]] || 0) + 1;
                });
            });

            const draw = (id, type, dataObj, color) => {
                new Chart(document.getElementById(id), {
                    type: type,
                    data: {
                        labels: Object.keys(dataObj),
                        datasets: [{ data: Object.values(dataObj), backgroundColor: color }]
                    },
                    options: { plugins: { legend: { display: type === 'pie' } } }
                });
            };

            draw('cPun', 'pie', counts.puntualita, ['#4CAF50', '#2196F3', '#FFC107', '#9E9E9E']);
            draw('cOrg', 'bar', counts.orgasmo, '#E91E63');
            draw('cVoto', 'bar', counts.voto_finale, '#C2185B');
            draw('cBis', 'doughnut', counts.bis, ['#E91E63', '#333', '#eee']);
        }

        function reset() {
            if(confirm("Vuoi davvero azzerare tutto?")) {
                localStorage.removeItem('gallo_results_v2');
                location.reload();
            }
        }
        init();
    </script>
</body>
</html>
