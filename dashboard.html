<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Il Gallo di Rimini</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #fdf2f8; padding: 20px; color: #1A1A2E; }
        .container { max-width: 1100px; margin: auto; }
        .header { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; }
        .logo-img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #E91E63; object-fit: cover; margin-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; }
        .card { background: white; padding: 20px; border-radius: 20px; border: 1px solid #FFCDD2; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h3 { color: #C2185B; font-size: 14px; margin-bottom: 15px; border-bottom: 1px solid #FCE4EC; padding-bottom: 5px; text-transform: uppercase; }
        .comment-list { max-height: 200px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .comment-item { background: #FFF8FB; padding: 10px; border-radius: 10px; font-size: 13px; border-left: 4px solid #E91E63; }
        .nav-link { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #E91E63; font-weight: bold; }
        canvas { max-height: 200px; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="nav-link">← Home</a>
    <div class="header">
        <img src="https://raw.githubusercontent.com/dani123456789-ctrl/Il-Gallo-di-Rimini/main/Gallo.png" alt="Logo" class="logo-img">
        <h1>📊 Risultati Integrali</h1>
    </div>

    <div class="grid" id="main-grid"></div>
</div>

<script>
    window.onload = function() {
        const data = JSON.parse(localStorage.getItem('gallo_results_v2') || '[]');
        const grid = document.getElementById('main-grid');
        if (data.length === 0) { grid.innerHTML = "<p>Nessun dato.</p>"; return; }

        const charts = [
            { id: 'puntualita', title: 'Puntualità' }, { id: 'ascolto', title: 'Ascolto' },
            { id: 'memoria', title: 'Memoria' }, { id: 'approccio', title: 'Approccio' },
            { id: 'bis', title: 'Altro Appuntamento' }, { id: 'durata', title: 'Durata' },
            { id: 'gps', title: 'Capacità GPS' }, { id: 'preliminari', title: 'Preliminari' },
            { id: 'posizioni', title: 'Posizioni' }, { id: 'orgasmo', title: 'Orgasmo' },
            { id: 'voto_finale', title: 'Voto Finale' }
        ];

        charts.forEach(conf => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<h3>${conf.title}</h3><canvas id="c-${conf.id}"></canvas>`;
            grid.appendChild(card);
            const counts = {};
            data.forEach(item => { const v = item[conf.id] || "N/D"; counts[v] = (counts[v] || 0) + 1; });
            new Chart(document.getElementById(`c-${conf.id}`), {
                type: 'bar',
                data: { labels: Object.keys(counts), datasets: [{ data: Object.values(counts), backgroundColor: '#E91E63' }] },
                options: { responsive: true, plugins: { legend: { display: false } } }
            });
        });

        const texts = [{ id: 'difetto', title: '🆘 Difetti' }, { id: 'forza', title: '⭐️ Pregi' }, { id: 'sugg_intimo', title: '💄 Suggerimenti' }];
        texts.forEach(conf => {
            const card = document.createElement('div'); card.className = 'card';
            let html = `<h3>${conf.title}</h3><div class="comment-list">`;
            const comms = data.map(i => i[conf.id]).filter(t => t && t.trim() !== "");
            if (comms.length > 0) comms.forEach(t => html += `<div class="comment-item">${t}</div>`);
            else html += `<p style="font-size:12px;color:#999">Nessun commento.</p>`;
            card.innerHTML = html + `</div>`; grid.appendChild(card);
        });
    };
</script>
</body>
</html>
