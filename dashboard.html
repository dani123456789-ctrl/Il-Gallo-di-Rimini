<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Completa - Il Gallo di Rimini</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #fdf2f8; padding: 20px; color: #1A1A2E; }
        .container { max-width: 1100px; margin: auto; }
        h1 { text-align: center; color: #E91E63; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #FFCDD2; margin-bottom: 25px; min-height: 300px; }
        .card h3 { color: #C2185B; font-size: 16px; margin-bottom: 15px; border-bottom: 1px solid #FCE4EC; padding-bottom: 10px; text-transform: uppercase; }
        .comment-list { max-height: 220px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .comment-item { background: #FFF8FB; padding: 12px; border-radius: 10px; font-size: 14px; border-left: 4px solid #E91E63; line-height: 1.4; }
        .no-data { color: #999; font-style: italic; text-align: center; margin-top: 20px; }
        canvas { max-height: 220px; }
        .nav-link { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #E91E63; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="nav-link">← Torna alla Home</a>
    <h1>📊 Report Integrale "Il Gallo di Rimini"</h1>
    <div class="grid" id="main-grid"></div>
</div>

<script>
    window.onload = function() {
        const data = JSON.parse(localStorage.getItem('gallo_results_v2') || '[]');
        const grid = document.getElementById('main-grid');
        
        if (data.length === 0) {
            grid.innerHTML = "<div class='card'><p class='no-data'>Nessun dato presente. Invia un questionario per vedere i risultati!</p></div>";
            return;
        }

        // --- PARTE 1: GRAFICI ---
        const chartConfigs = [
            { id: 'puntualita', title: 'Puntualità' },
            { id: 'ascolto', title: 'Ascolto' },
            { id: 'memoria', title: 'Memoria Dettagli' },
            { id: 'approccio', title: 'Approccio' },
            { id: 'bis', title: 'Altro Appuntamento' },
            { id: 'durata', title: 'Durata' },
            { id: 'gps', title: 'Capacità GPS' },
            { id: 'preliminari', title: 'Preliminari' },
            { id: 'posizioni', title: 'Posizioni' },
            { id: 'orgasmo', title: 'Orgasmo' },
            { id: 'voto_finale', title: 'Performance Globale' }
        ];

        chartConfigs.forEach(conf => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<h3>${conf.title}</h3><canvas id="chart-${conf.id}"></canvas>`;
            grid.appendChild(card);

            const counts = {};
            data.forEach(item => {
                const val = item[conf.id] || "N/D";
                counts[val] = (counts[val] || 0) + 1;
            });

            new Chart(document.getElementById(`chart-${conf.id}`), {
                type: 'bar',
                data: {
                    labels: Object.keys(counts),
                    datasets: [{ data: Object.values(counts), backgroundColor: '#E91E63' }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } } 
                }
            });
        });

        // --- PARTE 2: COMMENTI TESTUALI (DIFETTI, PUNTI DI FORZA, SUGGERIMENTI) ---
        const textConfigs = [
            { id: 'difetto', title: '🆘 Peggiori Difetti' },
            { id: 'forza', title: '⭐️ Punti di Forza' },
            { id: 'sugg_intimo', title: '💄 Suggerimenti Intimi' }
        ];

        textConfigs.forEach(conf => {
            const card = document.createElement('div');
            card.className = 'card';
            
            let html = `<h3>${conf.title}</h3><div class="comment-list">`;
            
            // Estrae i commenti per questa specifica categoria
            const comments = data
                .map(item => item[conf.id]) 
                .filter(text => text && text.trim() !== ""); // Esclude i vuoti

            if (comments.length > 0) {
                comments.forEach(text => {
                    html += `<div class="comment-item">${text}</div>`;
                });
            } else {
                html += `<p class="no-data">Ancora nessun commento.</p>`;
            }

            html += `</div>`;
            card.innerHTML = html;
            grid.appendChild(card);
        });
    };
</script>
</body>
</html>
